name = "accio-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ---- D1 数据库 ----
# 创建: wrangler d1 create accio-db
# 然后把 database_id 填入下方
[[d1_databases]]
binding = "DB"
database_name = "accio-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"

# ---- KV 命名空间 ----
# 创建: wrangler kv namespace create ACCIO_KV
# 然后把 id 填入下方
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_ID"

# ---- 环境变量 ----
[vars]
ACCIO_BASE_URL = "https://phoenix-gw.alibaba.com"
ACCIO_VERSION = "0.5.4"

# 管理员密码请用 secret 设置：
# wrangler secret put ADMIN_PASSWORD

# ---- 静态资源作为文本模块导入 ----
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = false

# ---- 定时任务: 每5分钟巡检额度 ----
[triggers]
crons = ["*/5 * * * *"]
